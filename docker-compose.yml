version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: talevoice-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-talevoice}
      POSTGRES_USER: ${POSTGRES_USER:-talevoice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-talevoice123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talevoice} -d ${POSTGRES_DB:-talevoice}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: talevoice-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
